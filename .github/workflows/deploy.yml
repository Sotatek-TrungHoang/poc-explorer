name: Deploy to Server

on:
  push:
    branches: [main]
    paths:
      - 'docker-compose/**'
      - 'docker/**'
      - 'config/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:
    inputs:
      compose_file:
        description: 'Docker Compose file to use'
        required: false
        default: 'no-services.yml'
        type: choice
        options:
          - no-services.yml
          - docker-compose.yml

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  COMPOSE_FILE: ${{ github.event.inputs.compose_file || 'no-services.yml' }}

jobs:
  deploy:
    name: Deploy MobiChain Explorer
    runs-on: self-hosted
    environment: production
    defaults:
      run:
        working-directory: docker-compose
    steps:
      - name: Fix workspace permissions
        working-directory: .
        run: |
          # Docker volumes create root-owned dirs that block checkout cleanup
          if [ -d "${{ github.workspace }}/docker-compose/services/blockscout-db-data" ]; then
            docker run --rm -v "${{ github.workspace }}:/workspace" alpine \
              sh -c "chmod -R 777 /workspace/docker-compose/services/blockscout-db-data" || true
          fi

      - uses: actions/checkout@v4

      - name: Write production environment overrides
        run: |
          echo "CORS_ALLOWED_ORIGIN=${{ secrets.CORS_ALLOWED_ORIGIN }}" > .env
          echo "NEXT_PUBLIC_API_HOST=${{ secrets.NEXT_PUBLIC_API_HOST }}" >> .env
          echo "NEXT_PUBLIC_API_PROTOCOL=${{ secrets.NEXT_PUBLIC_API_PROTOCOL }}" >> .env
          echo "NEXT_PUBLIC_APP_HOST=${{ secrets.NEXT_PUBLIC_APP_HOST }}" >> .env
          echo "NEXT_PUBLIC_APP_PROTOCOL=${{ secrets.NEXT_PUBLIC_APP_PROTOCOL }}" >> .env
          echo "NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL=${{ secrets.NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL }}" >> .env

      - name: Build frontend and pull other images
        run: |
          echo "=== Building custom frontend image ==="
          docker compose -f ${{ env.COMPOSE_FILE }} build frontend

          echo "=== Pulling remaining images ==="
          docker compose -f ${{ env.COMPOSE_FILE }} pull --ignore-buildable

      - name: Stop and clean existing deployment
        run: |
          echo "=== Stopping existing containers ==="
          docker compose -f ${{ env.COMPOSE_FILE }} down --timeout 60 --remove-orphans || true

          # Remove any leftover containers with conflicting names
          for c in db backend frontend proxy redis-db docker-compose-db-init-1; do
            docker rm -f "$c" 2>/dev/null || true
          done

          # Prune unused networks
          docker network prune -f || true

      - name: Start containers
        run: |
          echo "=== Starting containers ==="
          docker compose -f ${{ env.COMPOSE_FILE }} up -d

          echo "=== Waiting for services to start ==="
          sleep 30

          echo "=== Container status ==="
          docker compose -f ${{ env.COMPOSE_FILE }} ps

      - name: Cleanup old Docker images
        working-directory: .
        run: docker image prune -f || true

  health-check:
    name: Post-deploy Health Check
    runs-on: self-hosted
    needs: deploy
    steps:
      - name: Check API health
        run: |
          MAX_RETRIES=10
          RETRY_DELAY=15

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $i/$MAX_RETRIES..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 --max-time 30 \
              "http://localhost:8080/api/v2/stats" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "API is healthy (HTTP 200)"
              break
            fi

            if [ "$i" = "$MAX_RETRIES" ]; then
              echo "ERROR: API health check failed after $MAX_RETRIES attempts (last HTTP code: $HTTP_CODE)"
              exit 1
            fi

            echo "Not ready yet (HTTP $HTTP_CODE), retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done

      - name: Check frontend health
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 --max-time 30 \
            "http://localhost:8080" 2>/dev/null || echo "000")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "Frontend is healthy (HTTP 200)"
          else
            echo "WARNING: Frontend returned HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Verify indexing status
        run: |
          STATS=$(curl -s --max-time 30 "http://localhost:8080/api/v2/stats" 2>/dev/null)

          if echo "$STATS" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(f'Blocks: {d.get(\"total_blocks\", \"N/A\")}')
          print(f'Addresses: {d.get(\"total_addresses\", \"N/A\")}')
          print(f'Gas used today: {d.get(\"gas_used_today\", \"N/A\")}')
          "; then
            echo "Indexer is active and returning data."
          else
            echo "WARNING: Could not verify indexer status"
          fi

  notify:
    name: Notify Google Chat
    runs-on: ubuntu-latest
    needs: [deploy, health-check]
    if: always()
    steps:
      - name: Send notification
        run: |
          STATUS="${{ needs.health-check.result }}"
          if [ "$STATUS" = "success" ]; then
            ICON="✅"
            MESSAGE="Deploy succeeded"
          else
            ICON="❌"
            MESSAGE="Deploy failed (deploy: ${{ needs.deploy.result }}, health-check: ${{ needs.health-check.result }})"
          fi

          COMMIT_SHORT="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_SHORT:0:7}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1 | sed 's/"/\\"/g')
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"

          curl -s -X POST "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"${ICON} *[MobiChain Explorer]* ${MESSAGE}\n• Branch: \`${{ github.ref_name }}\`\n• Commit: \`${COMMIT_SHORT}\` — ${COMMIT_MSG}\n• Compose: \`${{ env.COMPOSE_FILE }}\`\n• Triggered by: ${{ github.actor }}\n• <${COMMIT_URL}|View commit> · <${RUN_URL}|View CI logs> · <${REPO_URL}|GitHub>\"}"
